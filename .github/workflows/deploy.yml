name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-backend:
    name: Check Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check compilation
        run: cargo check --release

      - name: Run clippy
        run: cargo clippy -- -D warnings 2>/dev/null || true

  check-frontend:
    name: Check Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  deploy-backend:
    name: Deploy Backend to Render
    needs: [check-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" || echo "Set RENDER_BACKEND_DEPLOY_HOOK secret"

  deploy-frontend:
    name: Deploy Frontend to Render
    needs: [check-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" || echo "Set RENDER_FRONTEND_DEPLOY_HOOK secret"
